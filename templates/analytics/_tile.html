{% load static %}
<div class="glass-card rounded-[24px] p-5 flex items-center gap-4 bg-[var(--surface-card-soft)]">
    <div class="w-12 h-12 rounded-2xl flex items-center justify-center border
        {% if tone == 'emerald' %}bg-emerald-500/10 text-emerald-400 border-emerald-500/20
        {% elif tone == 'blue' %}bg-blue-500/10 text-[#37b7ff] border-blue-500/20
        {% elif tone == 'violet' %}bg-violet-500/10 text-violet-400 border-violet-500/20
        {% else %}bg-amber-500/10 text-amber-400 border-amber-500/20{% endif %}">
        <i data-lucide="{{ icon }}" class="w-6 h-6"></i>
    </div>
    <div>
        <p class="text-xs text-[var(--text-muted)] uppercase tracking-wider font-semibold">{{ label }}</p>
        <h3 class="text-xl font-extrabold text-[var(--text-primary)] mt-0.5">{{ value }}{{ suffix }}</h3>
    </div>
</div>
